services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: allu
      POSTGRES_PASSWORD: allu
      POSTGRES_DB: allu
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U allu"]
      interval: 5s
      timeout: 5s
      retries: 5

  catalog-service:
    build:
      context: .
      dockerfile: services/catalog-service/Dockerfile
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      LOG_LEVEL: info
      LOG_FILE: /var/log/app/catalog.log
      DATABASE_URL: postgresql://allu:allu@postgres:5432/allu?schema=public
    volumes:
      - app_logs:/var/log/app
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  search-service:
    build:
      context: .
      dockerfile: services/search-service/Dockerfile
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      LOG_LEVEL: info
      LOG_FILE: /var/log/app/search.log
    volumes:
      - app_logs:/var/log/app
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:3002/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  cart-service:
    build:
      context: .
      dockerfile: services/cart-service/Dockerfile
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      LOG_LEVEL: info
      LOG_FILE: /var/log/app/cart.log
      DATABASE_URL: postgresql://allu:allu@postgres:5432/allu?schema=public
    volumes:
      - app_logs:/var/log/app
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:3003/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - catalog-service
      - search-service
      - cart-service

  loki:
    image: grafana/loki:2.9.3
    ports:
      - "3100:3100"
    volumes:
      - ./infra/loki-config.yml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  promtail:
    image: grafana/promtail:2.9.3
    volumes:
      - ./infra/promtail-config.yml:/etc/promtail/config.yml
      - app_logs:/var/log/app:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:10.3.0
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./infra/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - loki

volumes:
  postgres_data:
  app_logs:
  loki_data:
