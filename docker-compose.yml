services:
  postgres:
    container_name: db
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/init-schemas.sql:/docker-entrypoint-initdb.d/init-schemas.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 3

  cart-service:
    container_name: cart
    build:
      context: .
      dockerfile: services/cart-service/Dockerfile
      args:
        - CART_PORT=${CART_PORT}
    ports:
      - "${CART_PORT}:${CART_PORT}"
    environment:
      PORT: ${CART_PORT}
      LOG_LEVEL: ${LOG_LEVEL}
      LOG_FILE: /var/log/app/cart.log
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:5432/${POSTGRES_DB}?schema=cart-schema
    volumes:
      - app_logs:/var/log/app
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:${CART_PORT}/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  catalog-service:
    container_name: catalog
    build:
      context: .
      dockerfile: services/catalog-service/Dockerfile
      args:
        - CATALOG_PORT=${CATALOG_PORT}
    ports:
      - "${CATALOG_PORT}:${CATALOG_PORT}"
    environment:
      PORT: ${CATALOG_PORT}
      LOG_LEVEL: ${LOG_LEVEL}
      LOG_FILE: /var/log/app/catalog.log
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:5432/${POSTGRES_DB}?schema=catalog-schema
    volumes:
      - app_logs:/var/log/app
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:${CATALOG_PORT}/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  search-service:
    container_name: search
    build:
      context: .
      dockerfile: services/search-service/Dockerfile
      args:
        - SEARCH_PORT=${SEARCH_PORT}
    ports:
      - "${SEARCH_PORT}:${SEARCH_PORT}"
    environment:
      PORT: ${SEARCH_PORT}
      LOG_LEVEL: ${LOG_LEVEL}
      LOG_FILE: /var/log/app/search.log
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:5432/${POSTGRES_DB}?schema=search-schema
    volumes:
      - app_logs:/var/log/app
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:${SEARCH_PORT}/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    container_name: frontend
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        - FRONTEND_PORT=${FRONTEND_PORT}
        - VITE_CART_API_URL=${VITE_CART_API_URL}
        - VITE_CATALOG_API_URL=${VITE_CATALOG_API_URL}
        - VITE_SEARCH_API_URL=${VITE_SEARCH_API_URL}
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
    environment:
      FRONTEND_PORT: ${FRONTEND_PORT}
    depends_on:
      catalog-service:
        condition: service_healthy
      search-service:
        condition: service_healthy
      cart-service:
        condition: service_healthy
    restart: unless-stopped

  loki:
    image: grafana/loki:2.9.3
    ports:
      - "3100:3100"
    volumes:
      - ./infra/loki-config.yml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  promtail:
    image: grafana/promtail:2.9.3
    volumes:
      - ./infra/promtail-config.yml:/etc/promtail/config.yml
      - app_logs:/var/log/app:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      loki:
        condition: service_healthy
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.3.0
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./infra/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      loki:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  app_logs:
  loki_data:
