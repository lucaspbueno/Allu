services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  catalog-service:
    build:
      context: .
      dockerfile: services/catalog-service/Dockerfile
    ports:
      - "${CATALOG_PORT}:${CATALOG_PORT}"
    environment:
      PORT: ${CATALOG_PORT}
      LOG_LEVEL: ${LOG_LEVEL}
      LOG_FILE: /var/log/app/catalog.log
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
    volumes:
      - app_logs:/var/log/app
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:${CATALOG_PORT}/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  search-service:
    build:
      context: .
      dockerfile: services/search-service/Dockerfile
    ports:
      - "${SEARCH_PORT}:${SEARCH_PORT}"
    environment:
      PORT: ${SEARCH_PORT}
      LOG_LEVEL: ${LOG_LEVEL}
      LOG_FILE: /var/log/app/search.log
    volumes:
      - app_logs:/var/log/app
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:${SEARCH_PORT}/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  cart-service:
    build:
      context: .
      dockerfile: services/cart-service/Dockerfile
    ports:
      - "${CART_PORT}:${CART_PORT}"
    environment:
      PORT: ${CART_PORT}
      LOG_LEVEL: ${LOG_LEVEL}
      LOG_FILE: /var/log/app/cart.log
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
    volumes:
      - app_logs:/var/log/app
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:${CART_PORT}/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - catalog-service
      - search-service
      - cart-service

  loki:
    image: grafana/loki:2.9.3
    ports:
      - "3100:3100"
    volumes:
      - ./infra/loki-config.yml:/etc/loki/local-config.yaml
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  promtail:
    image: grafana/promtail:2.9.3
    volumes:
      - ./infra/promtail-config.yml:/etc/promtail/config.yml
      - app_logs:/var/log/app:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:10.3.0
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./infra/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - loki

volumes:
  postgres_data:
  app_logs:
  loki_data:
